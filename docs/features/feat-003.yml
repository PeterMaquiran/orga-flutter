id: FEAT-003
title: Habit Completion

description: >
  Allows users to mark a habit as completed for the current day.

inputs:
  - habit_id
  - date

outputs:
  - completion_record_created
  - streak_updated

business_rules:
  - habit can only be completed once per day
  - completion increments streak

edge_cases:
  - duplicate completion attempt
  - offline mode